{% extends "navbar.html" %}

{% block top %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin | Logs</title>

<style>
    :root{
        --bg:#050505;
        --inside:#0c0c0c;
        --outline:#242424;
        --grid:#202020;
        --grid2:#1a1a1a;
        --txt:#e9e9e9;
        --muted:#bfbfbf;
        --muted2:#a2a2a2;
        --btn-red:#4c0a14;
        --btn-green:#104010;
        --usernameDefault:#6fb7ff;
    }

    .main-container {
        margin-left: 370px;
        padding: 20px 20px 0 15px;
        color: #fff;
        font-size: 13px;
    }
    .main-container *{box-sizing:border-box}

    html,body{height:100%}
    body{
        margin:0;
        background:var(--bg);
        color:var(--txt);
        font:13px Tahoma, Arial, sans-serif;
    }

    .wrap{width:1400px;max-width:96vw}

    .panel{
        border:1px solid var(--outline);
        background:var(--inside);
        margin-bottom:14px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 -1px 0 rgba(0,0,0,0.65);
    }

    .btn{
        height:28px;
        padding:0 12px;
        line-height:26px;
        font-size:11px;
        font-weight:700;
        font-family:Tahoma,Arial,sans-serif;
        border:1px solid var(--outline);
        background:#0b0b0b;
        color:#e6e6e6;
        text-shadow:0 1px 0 #000;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.05), inset 0 -1px 0 rgba(0,0,0,.6);
        cursor:pointer;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        border-radius:3px;
        white-space:nowrap;
    }
    .btn:active{ box-shadow: inset 0 2px 4px rgba(0,0,0,.8); transform:translateY(1px); }

    table{width:100%;border-collapse:collapse;table-layout:fixed}
    thead th{
        background:#0b0b0b;
        padding:7px 10px;
        border-bottom:1px solid var(--grid);
        text-align:center;
        color:var(--muted);
        font-weight:700;
    }
    tbody td{
        padding:8px 10px;
        border-bottom:1px solid var(--grid2);
        font-weight:700;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        text-align:center;
    }
    tbody tr:nth-child(odd) td{background:#0a0a0a}
    tbody tr:nth-child(even) td{background:#080808}

    .h1{
        font-weight:700;
        font-size:18px;
        margin:0 0 10px 0;
        text-shadow:0 1px 0 #000;
    }

    .panel-title-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 10px;
        background: var(--inside);
        border-bottom: 1px solid var(--grid);
    }
    .panel-title {
        font-weight:700;
        color:#dcdcdc;
        text-shadow:0 1px 0 #000;
        font-size: 13px;
    }

    .search-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .search-input {
        height: 26px;
        padding: 0 8px;
        background: #0b0b0b;
        border: 1px solid var(--outline);
        color: var(--txt);
        font: 11px Tahoma, Arial, sans-serif;
        border-radius: 3px;
        outline: none;
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.7);
        width: 200px;
        transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #3a3a3a; }
    .search-input::placeholder { color: #555; }
    .search-clear {
        height: 26px;
        padding: 0 8px;
        font-size: 10px;
        font-weight: 700;
        font-family: Tahoma, Arial, sans-serif;
        border: 1px solid var(--outline);
        background: #0b0b0b;
        color: #888;
        border-radius: 3px;
        cursor: pointer;
        display: none;
    }
    .search-clear:hover { color: #bbb; }
    .search-clear.visible { display: inline-block; }

    .empty-row{
        text-align:center;
        color:#777;
        font-weight:700;
        padding:12px 10px !important;
        background:#080808 !important;
    }
    .user-link:hover { text-decoration: underline !important; }

    .no-results-row td {
        text-align: center;
        color: #666;
        font-weight: 700;
        padding: 12px 10px !important;
        background: #080808 !important;
    }

    .pagination-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-top: 1px solid var(--grid);
        background: var(--inside);
        flex-wrap: wrap;
        gap: 6px;
    }
    .pagination-info {
        color: var(--muted2);
        font-size: 11px;
        font-weight: 700;
    }
    .pagination-info span { color: var(--muted); }
    .pagination-pages {
        display: flex;
        align-items: center;
        gap: 3px;
    }
    .pg-btn {
        height: 24px;
        min-width: 24px;
        padding: 0 6px;
        font-size: 11px;
        font-weight: 700;
        font-family: Tahoma, Arial, sans-serif;
        border: 1px solid var(--outline);
        background: #0b0b0b;
        color: #aaa;
        cursor: pointer;
        border-radius: 3px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, color 0.15s;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .pg-btn:hover:not(:disabled):not(.pg-active) { background: #141414; color: #ddd; }
    .pg-btn.pg-active { background: #1a1a1a; border-color: #3a3a3a; color: #fff; cursor: default; }
    .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pg-ellipsis { color: #555; font-size: 11px; padding: 0 3px; font-weight: 700; }

    .log-type {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.3px;
        background: #111;
        border: 1px solid #2a2a2a;
        color: #aaa;
    }

    @media (max-width: 768px) {
        .main-container {
            margin-left: 0;
            padding: 75px 10px 0 10px;
        }
        .wrap { max-width: 100%; }
        .panel-title-bar {
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }
        .search-wrap { width: 100%; }
        .search-input { width: 100%; flex: 1; }
        table { table-layout: auto; }
        thead th:nth-child(4),
        tbody td:nth-child(4) { display: none; }
        tbody td { padding: 7px 6px; font-size: 11px; }
        thead th { padding: 7px 6px; font-size: 11px; }
        .pagination-bar { flex-direction: column; align-items: center; }
        .pg-btn { height: 30px; min-width: 30px; }
    }

    @media (max-width: 480px) {
        .h1 { font-size: 15px; }
        .panel-title { font-size: 12px; }
        thead th:nth-child(3),
        tbody td:nth-child(3) { display: none; }
    }
</style>
</head>

<body>
    {% include 'admin/navbar.html' %}

    <main class="main-container">
        <div class="wrap">
            <div class="h1">Logs</div>

            <div class="panel">
                <div class="panel-title-bar">
                    <div class="panel-title">System Logs</div>
                    <div class="search-wrap">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search action, user, date..." />
                        <button id="searchClear" class="search-clear" type="button">✕</button>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th style="width:6%;">ID</th>
                            <th style="width:28%;">Action</th>
                            <th style="width:20%;">By</th>
                            <th style="width:26%;">Date</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>

                <div class="pagination-bar">
                    <div class="pagination-info" id="paginationInfo"></div>
                    <div class="pagination-pages" id="paginationPages"></div>
                </div>
            </div>
        </div>
    </main>

<script>
    const LOGS = (() => {
        const PER_PAGE = 10;
        let currentPage = 1;
        let currentQ = '';
        let totalPages = 1;
        let totalCount = 0;

        const tbody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const infoEl = document.getElementById('paginationInfo');
        const pagesEl = document.getElementById('paginationPages');

        let searchTimer = null;

        function buildRow(e) {
            const tr = document.createElement('tr');

            const tdId = document.createElement('td');
            tdId.textContent = e.id;

            const tdAction = document.createElement('td');
            const badge = document.createElement('span');
            badge.className = 'log-type';
            badge.textContent = e.deys || '';
            tdAction.appendChild(badge);

            const tdLogin = document.createElement('td');
            if (!e.login || e.login_status === 'anonymous') {
                tdLogin.textContent = e.login || '';
            } else {
                const a = document.createElement('a');
                a.href = '/user/' + e.login;
                a.target = '_blank';
                a.style.cssText = (e.rank_style || '') + ' text-decoration:none;';
                a.className = 'user-link';
                const s = document.createElement('span');
                s.style.color = e.login_color;
                s.textContent = e.login;
                a.appendChild(s);
                if (e.suffix) { a.appendChild(document.createTextNode(' ' + e.suffix)); }
                tdLogin.appendChild(a);
            }

            const tdDate = document.createElement('td');
            tdDate.textContent = e.date || '';

            tr.append(tdId, tdAction, tdLogin, tdDate);
            return tr;
        }

        function fetch_page(page, q) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-row">Loading...</td></tr>';
            const params = new URLSearchParams({ page: page, q: q });
            fetch('/api/logs?' + params.toString())
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    currentPage = d.page;
                    totalPages = d.total_pages;
                    totalCount = d.total;
                    tbody.innerHTML = '';
                    if (!d.entries || d.entries.length === 0) {
                        const tr = document.createElement('tr');
                        tr.className = 'no-results-row';
                        tr.innerHTML = '<td colspan="5">No entries match your search.</td>';
                        tbody.appendChild(tr);
                    } else {
                        d.entries.forEach(function(e) { tbody.appendChild(buildRow(e)); });
                    }
                    renderInfo();
                    renderPages();
                });
        }

        function renderInfo() {
            if (totalCount === 0) { infoEl.innerHTML = ''; return; }
            const start = (currentPage - 1) * PER_PAGE;
            const end = Math.min(start + PER_PAGE, totalCount);
            infoEl.innerHTML = 'Showing <span>' + (start + 1) + '–' + end + '</span> of <span>' + totalCount + '</span>';
        }

        function renderPages() {
            pagesEl.innerHTML = '';
            if (totalPages <= 1) return;

            function makeBtn(label, page, isActive, isDisabled) {
                const b = document.createElement('button');
                b.className = 'pg-btn' + (isActive ? ' pg-active' : '');
                b.textContent = label;
                b.disabled = isDisabled;
                if (!isActive && !isDisabled) {
                    b.addEventListener('click', function() { fetch_page(page, currentQ); });
                }
                return b;
            }

            function makeEllipsis() {
                const s = document.createElement('span');
                s.className = 'pg-ellipsis';
                s.textContent = '…';
                return s;
            }

            pagesEl.appendChild(makeBtn('‹', currentPage - 1, false, currentPage === 1));

            const range = buildPageRange(currentPage, totalPages);
            let prev = null;
            range.forEach(function(p) {
                if (prev !== null && p - prev > 1) pagesEl.appendChild(makeEllipsis());
                pagesEl.appendChild(makeBtn(p, p, p === currentPage, false));
                prev = p;
            });

            pagesEl.appendChild(makeBtn('›', currentPage + 1, false, currentPage === totalPages));
        }

        function buildPageRange(cur, total) {
            const delta = 2;
            const range = new Set([1, total]);
            for (let i = Math.max(2, cur - delta); i <= Math.min(total - 1, cur + delta); i++) range.add(i);
            return Array.from(range).sort(function(a, b) { return a - b; });
        }

        searchInput.addEventListener('input', function() {
            currentQ = searchInput.value.trim();
            searchClear.classList.toggle('visible', currentQ.length > 0);
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function() { fetch_page(1, currentQ); }, 300);
        });

        searchClear.addEventListener('click', function() {
            searchInput.value = '';
            currentQ = '';
            searchClear.classList.remove('visible');
            fetch_page(1, '');
        });

        fetch_page(1, '');
    })();
</script>
</body>
</html>
{% endblock %}
